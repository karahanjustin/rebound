<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HomeServiceReply</title>
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f5f1; --surface:#fff; --ink:#171511; --ink2:#605c53; --ink3:#8b867c;
    --line:#e7e3da; --line2:#dcd7cc; --accent:#e2502c; --accent-d:#bd3c1d; --accent-soft:#fbe9e3;
    --money:#13794f; --money-soft:#e4f3ec; --amber:#b5790c; --amber-soft:#f8eed6;
    --disp:"Space Grotesk",-apple-system,sans-serif; --sans:"Inter",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:
       radial-gradient(1200px 600px at 50% -5%, #fdfcfa, var(--paper));
       color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
  .page{max-width:1240px;margin:0 auto;padding:30px 26px 60px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:8px;flex-wrap:wrap}
  .title{display:flex;align-items:center;gap:11px}
  .title .mk{width:30px;height:30px;background:url('/favicon.svg') center/contain no-repeat}
  .title h1{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:-.03em}
  .title .sub{font-size:12.5px;color:var(--ink3);margin-top:1px}
  .hint{font-size:12px;color:var(--ink3);background:var(--surface);border:1px solid var(--line);
        padding:7px 12px;border-radius:999px}

  .map{position:relative;display:grid;grid-template-columns:1fr 1fr 1fr;gap:30px 96px;
       align-items:center;margin-top:26px}
  #wires{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
  #wires path{fill:none;stroke:var(--accent);stroke-width:2;opacity:.32}
  #wires circle{fill:var(--accent)}

  .node{position:relative;z-index:1;background:var(--surface);border:1px solid var(--line);
        border-radius:18px;padding:17px 18px;box-shadow:0 1px 0 rgba(0,0,0,.02),0 10px 26px -18px rgba(40,30,15,.32)}
  .hub{grid-column:2;grid-row:2;z-index:2;text-align:center;background:#181611;color:#fff;
       border-color:#181611;padding:24px 22px;border-radius:22px;
       box-shadow:0 18px 44px -20px rgba(40,30,15,.6)}
  .hub .mk{width:42px;height:42px;background:url('/favicon.svg') center/contain no-repeat;margin:0 auto 12px}
  .hub h2{font-family:var(--disp);font-weight:700;font-size:24px;letter-spacing:-.03em}
  .hub p{font-size:13px;color:#c9c3b8;margin:5px 0 14px}
  .hub a.live{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;
       font-weight:600;font-size:13.5px;padding:9px 15px;border-radius:10px;text-decoration:none}
  .hub a.live:hover{background:var(--accent-d)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px}
  .chip{font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
  .chip .d{width:6px;height:6px;border-radius:50%}
  .chip.ok{background:var(--money-soft);color:var(--money)} .chip.ok .d{background:var(--money)}
  .chip.wait{background:var(--amber-soft);color:var(--amber)} .chip.wait .d{background:var(--amber)}

  .node h3{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:-.01em;
           display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .node h3 .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
               background:var(--accent-soft);color:var(--accent-d);flex:none}
  .node h3 .ic svg{width:17px;height:17px;stroke:currentColor;stroke-width:1.9;fill:none;
                   stroke-linecap:round;stroke-linejoin:round}
  a.row{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);
        font-size:13.5px;font-weight:500;padding:6px 8px;margin:0 -8px;border-radius:8px;transition:background .12s}
  a.row:hover{background:#faf8f4}
  a.row .ar{margin-left:auto;color:var(--ink3);font-size:12px}
  a.row:hover .ar{color:var(--accent-d)}
  .legal{display:flex;flex-wrap:wrap;gap:4px 6px;font-size:12px;margin:6px 2px 2px}
  .legal a{color:var(--ink2);text-decoration:none;border-bottom:1px dotted var(--line2)}
  .legal a:hover{color:var(--accent-d)}
  .meta{font-size:12.5px;color:var(--ink2);line-height:1.5;margin:2px 2px 0}
  .flow{font-size:12px;color:var(--ink2);background:#faf8f4;border:1px solid var(--line);
        border-radius:10px;padding:9px 11px;line-height:1.65;margin-bottom:9px}
  .flow b{color:var(--ink);font-weight:600}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .tag{font-size:11px;color:var(--ink2);background:#f3f1ec;border:1px solid var(--line);
       padding:3px 8px;border-radius:6px}
  .deploybtn{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;
       font-weight:600;font-size:13px;padding:9px 13px;border-radius:9px;text-decoration:none;margin-bottom:4px}
  .deploybtn:hover{background:#000}
  .checklist{list-style:none;font-size:13px;line-height:1.45}
  .checklist li{display:flex;gap:8px;padding:3px 0;color:var(--ink2)}
  .checklist li b{color:var(--ink);font-weight:600}
  .checklist .mk2{flex:none;width:16px;height:16px;border-radius:5px;margin-top:1px;display:flex;
       align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .done .mk2{background:var(--money-soft);color:var(--money)}
  .todo .mk2{background:var(--amber-soft);color:var(--amber)}
  .foot{text-align:center;font-size:11.5px;color:var(--ink3);margin-top:34px}

  @media(max-width:880px){
    .map{grid-template-columns:1fr;gap:16px}
    .node,.hub{grid-column:auto !important;grid-row:auto !important}
    .hub{order:-1}
    #wires{display:none}
  }
</style>
</head>
<body>
<style>
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1000px 500px at 50% -10%, #fdfcfa, #f6f5f1);z-index:50;padding:24px}
  .gatecard{background:#fff;border:1px solid #e7e3da;border-radius:20px;padding:34px 30px;width:340px;max-width:100%;
    text-align:center;box-shadow:0 20px 50px -22px rgba(40,30,15,.4)}
  .gatecard .gmk{width:46px;height:46px;background:url('/favicon.svg') center/contain no-repeat;margin:0 auto 16px}
  .gatecard h1{font-family:"Space Grotesk",-apple-system,sans-serif;font-weight:700;font-size:21px;letter-spacing:-.03em;color:#171511}
  .gatecard p{font-size:13px;color:#8b867c;margin:4px 0 20px}
  #gform{display:flex;flex-direction:column;gap:10px}
  #gcode{border:1px solid #dcd7cc;border-radius:11px;padding:12px 14px;font-size:16px;font-family:inherit;
    text-align:center;letter-spacing:.3em;outline:none}
  #gcode:focus{border-color:#e2502c}
  #gform button{border:0;background:#e2502c;color:#fff;font-weight:600;font-size:15px;border-radius:11px;
    padding:12px;cursor:pointer;font-family:inherit}
  #gform button:hover{background:#bd3c1d}
  #gerr{color:#bd3c1d;font-size:12.5px;font-weight:600;min-height:16px;margin-top:10px}
</style>

<div id="gate">
  <div class="gatecard">
    <div class="gmk"></div>
    <h1>HomeServiceReply</h1>
    <p>Company access only</p>
    <form id="gform">
      <input id="gcode" type="password" inputmode="numeric" placeholder="code" autocomplete="off" autofocus>
      <button type="submit">Unlock</button>
    </form>
    <div id="gerr"></div>
  </div>
</div>
<div id="vault" style="display:none"></div>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(code){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(code), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64d(PAY.salt), iterations:PAY.iters, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(PAY.iv)}, key, b64d(PAY.ct));
  return new TextDecoder().decode(pt);
}
function drawMap(){
  var svg=document.getElementById('wires'), map=document.getElementById('map'), hub=document.querySelector('.hub');
  if(!svg||!map||!hub) return;
  if(window.innerWidth<=880){svg.style.display='none';return;}
  svg.style.display='block';
  var mb=map.getBoundingClientRect();
  var hx=hub.getBoundingClientRect().left-mb.left+hub.offsetWidth/2;
  var hy=hub.getBoundingClientRect().top-mb.top+hub.offsetHeight/2;
  var out='';
  document.querySelectorAll('.node:not(.hub)').forEach(function(c){
    var b=c.getBoundingClientRect();
    var cx=b.left-mb.left+b.width/2, cy=b.top-mb.top+b.height/2, mx=(hx+cx)/2;
    out+='<path d="M'+hx+' '+hy+' C '+mx+' '+hy+', '+mx+' '+cy+', '+cx+' '+cy+'"/>';
  });
  out+='<circle cx="'+hx+'" cy="'+hy+'" r="4.5"/>';
  svg.innerHTML=out;
}
function reveal(html){
  var v=document.getElementById('vault');
  v.innerHTML=html; v.style.display='';
  document.getElementById('gate').style.display='none';
  drawMap();
}
window.addEventListener('resize', drawMap);
(function(){ var c=sessionStorage.getItem('hsr_map'); if(c){ try{ reveal(c); }catch(e){} } })();
document.getElementById('gform').addEventListener('submit', async function(e){
  e.preventDefault();
  var code=document.getElementById('gcode').value.trim();
  try{
    var html=await unlock(code);
    if(html.indexOf('class="page"')===-1) throw new Error('bad');
    sessionStorage.setItem('hsr_map', html);
    reveal(html);
  }catch(_){
    document.getElementById('gerr').textContent='Wrong code. Try again.';
    document.getElementById('gcode').value=''; document.getElementById('gcode').focus();
  }
});
</script>
